location_strategy: "grid"
location_parameters:
  sample_generator_process_pool_size: 6
  adjustment_buffer_distance_px: 0
presentation_strategy: "weighted"
presentation_strategy_parameters:
  length: 4000
  expected_class_balances:
    no damage: 1
    major damage: 1
    minor damage: 1
    destroyed: 1
    un-classified: 1
    obscured: 1
dataset_adaptor_parameters:
  tile_x: 2048
  tile_y: 2048
  mask_x: 2048
  mask_y: 2048
  backend: "auto"
  mask_scale_strategy: "pixel"
  tile_scale_strategy: "pixel"
  rescale_strategy: "interpolate"
  generate_adjusted_geoms: True
annotator_parameters:
  generate_adjusted_sample_locations: True
  building_intersection_proportion_threshold: 0.0