location_strategy: "centered"
location_parameters:
  tile_x: 1024
  tile_y: 1024
  min_gsd_x: 0.0177465 # 1.77465cm/px
  min_gsd_y: 0.0177465 # 1.77465cm/px
  max_gsd_x: 0.8 # 80cm/px
  max_gsd_y: 0.8 # 80cm/px
  multiscale_steps: 5
  multiscale_step_interval: "logspace" # "linspace" or "logspace" 
  scale_strategy: "spatial_px"
  sample_generator_process_pool_size: 6
  adjustment_buffer_distance_px: 326
presentation_strategy: "indexed"
dataset_adaptor_parameters:
  tile_x: 1024
  tile_y: 1024
  mask_x: 1024
  mask_y: 1024
  backend: "auto"
  mask_scale_strategy: "spatial_px"
  tile_scale_strategy: "spatial_px"
  rescale_strategy: "interpolate"
  generate_adjusted_geoms: True
annotator_parameters:
  generate_adjusted_sample_locations: True
  building_intersection_proportion_threshold: 0.0
