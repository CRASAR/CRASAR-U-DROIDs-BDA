name: "BDA_UNetS4ND_v1_quarter_CCE_no_bandlimit"
model_type: "MaskedTower"
model: "MaskedUNetS4NDTowerModule"
task: "BDA"
input:
  normalized_inputs: true
  mask_input: true
training:
  training_parameters:
    gradient_clip_val: 10.0
    batch_size: 1
    grad_accumulation: 2 #On single GPU this would be 16, however, with multigpu its 2 because 2*8 = 16
    log_images_every_n_steps: 100
    l1_reg: 1.0e-8
    mask_x: 2048
    mask_y: 2048
    max_epochs: 1000
    optimizer_parameters:
      name: "AdamW"
      weight_decay: 0.00001
      lr: 0.0001
    output_class_weights_strategy: "ipw"
    normalize_weights: False
    loss_parameters:
      loss: [["cross entropy", 1.0]]
      gamma: 2
      alpha: 0.25
      bins: 10
      momentum: 0.9
      smooth: 1.0e-06
validation:
  validation_parameters:
    batch_size: 1
    validation_monitor: "val_macro_f1"
    validation_monitor_mode: "max"
    validation_checkpoint_save_top_k: 3
    validation_reduce_lr_on_plateau_patience: 5
    validation_reduce_lr_on_plateau_cooldown: 3
    factor: 0.5
model_parameters:
  layers:
    inc:
      N: 8
      out_channels: 32
      precision: "half"
      chunk_size: 1
      band_limit_strategy: "none"
    down_1:
      N: 16
      in_channels: 32
      out_channels: 64
      precision: "half"
      chunk_size: 1
      band_limit_strategy: "none"
    down_2:
      N: 16
      in_channels: 64
      out_channels: 128
      precision: "half"
      chunk_size: 1
      band_limit_strategy: "none"
    down_3:
      N: 16
      in_channels: 128
      out_channels: 256
      precision: "half"
      chunk_size: 1
      band_limit_strategy: "none"
    down_4:
      N: 16
      in_channels: 256
      out_channels: 512
      precision: "half"
      chunk_size: 1
      band_limit_strategy: "none"
    down_5:
      N: 16
      in_channels: 512
      out_channels: 1024
      precision: "half"
      chunk_size: 1
      band_limit_strategy: "none"
    up_0:
      attention: True
      bilinear: False
      in_channels: 1024
      out_channels: 512
    up_1:
      attention: True
      bilinear: False
      in_channels: 512
      out_channels: 256
    up_2:
      attention: True
      bilinear: False
      in_channels: 256
      out_channels: 128
    up_3:
      attention: True
      bilinear: False
      in_channels: 128
      out_channels: 64
    up_4:
      attention: True
      bilinear: False
      in_channels: 64
      out_channels: 32