name: "BDA_UperNet_ScaleMae_CCE_Pretrained"
model_type: "MaskedEncoderDecoder"
encoder_type: "ScaleMAE"
decoder_type: "UperNet"
task: "BDA"
input:
  normalized_inputs: true
  mask_input: false
training:
  training_parameters:
    alpha: 0.25
    batch_size: 1
    gamma: 2
    grad_accumulation: 16
    l1_reg: 1.0e-09
    l2_reg: 1.0e-08
    log_images_every_n_steps: 100
    output_class_weights_strategy: "ipw"
    normalize_weights: False
    mask_x: 1024
    mask_y: 1024
    max_epochs: 1000
    optimizer_parameters:
      name: "AdamW"
      lr: 0.0001
      weight_decay: 0.00001
    output_class_weights:
      background: 1.0e-06
      destroyed: 23.706
      major damage: 9.852
      minor damage: 3.193
      no damage: 1.95
      un-classified: 35.23
    samples_per_epoch: 4000
    tile_x: 1024
    tile_y: 1024
    loss_parameters:
      loss: [["cross entropy", 1.0]]
      gamma: 2
      alpha: 0.25
      bins: 10
      momentum: 0.9
      smooth: 1.0e-06
validation:
  validation_parameters:
    validation_monitor: "val_macro_f1"
    validation_monitor_mode: "max"
    validation_checkpoint_save_top_k: 3
    validation_reduce_lr_on_plateau_cooldown: 3
    validation_reduce_lr_on_plateau_patience: 3
    batch_size: 1
model_parameters:
  decoder_parameters:
    in_channels: [1024, 1024, 1024, 1024]
    in_index: [0,1,2,3]
    pool_scales: [1,2,3,6]
    channels: 1024
    dropout_ratio: 0.1
    norm_cfg:
      type: 'SyncBN'
      requires_grad: True
    align_corners: False
    out_indicies: [2,9,16,23]
  n_cls: 6
  normalization: "vit"
  encoder_parameters:
    freeze_backbone: False
    patch_size: 16
    backbone: "scalemae"
    #backbone_path: "/data/group_data/hrail_modeling/pretrained_models/scalemae-vitlarge-800.pth"
    normalization: "vit"
    vit_model: vit_large_patch16
    n_heads: 16
    n_layers: 24
    patch_size: 16
    drop_path_rate: 0.1
    dropout: 0.0
    global_pool: False
